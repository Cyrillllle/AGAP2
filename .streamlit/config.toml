[client]
toolbarMode = "viewer"


[theme]
primaryColor = "#ff6b6b"             # Corail vibrant (boutons / actions)
backgroundColor = "#0b0f19"          # Fond nuit profond
secondaryBackgroundColor = "#373b4499" # Cartes / widgets
textColor = "#f1f5f9"                # Texte clair lisible

# Optional refinements
linkColor = "#ff8f6b"                # Pêche lumineux pour les liens
codeTextColor = "#e6edf3"
codeBackgroundColor = "#1b2135"      # Fond code légèrement bleuté
borderColor = "#2a3147"              # Bordures visibles mais élégantes